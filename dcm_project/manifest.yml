manifest_version: 2

type: DCM_PROJECT

#---------------------------------------------

default_target: DCM_DEV

targets:
  DCM_DEV:
    account_identifier: <! account_name !>
    project_name: <! db_name !>.<! schema_name !>.<! project_name !>_DEV
    project_owner: <! project_owner !>
    templating_config: DEV

#---------------------------------------------

templating:
  defaults:
    project_owner_role: <! project_owner !>
    wh_size: "SMALL"

  configurations:
    DEV:
      env_suffix: "_DEV"
      wh_size: "X-SMALL"
      teams:
        - name: "DEV_TEAM"
          data_retention_days: 1
          add_employees: TRUE
