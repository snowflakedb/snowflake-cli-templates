minimum_cli_version: "3.13.0"
files_to_render:
  - snowflake.yml
variables:
  - name: title
    default: My Streamlit App
    prompt: "Title of the streamlit app e.g. 'My Streamlit App'"
  - name: name
    default: my_streamlit_app
    prompt: "What is the name of the streamlit app object in Snowflake? e.g. 'my_streamlit_app'"
  - name: database
    default: my_database
    prompt: "What database should the app be deployed to?"
  - name: schema
    default: my_schema
    prompt: "What schema should the app be deployed to?"
  - name: query_warehouse
    default: my_streamlit_warehouse
    prompt: "On which warehouse SQL queries issued by the application are run"
  - name: compute_pool
    default: my_compute_pool
    prompt: "What compute pool should the app use?"
  - name: pypi_access_integration
    default: pypi_access_integration
    prompt: "What is the name of your external access integration for PyPI?"
